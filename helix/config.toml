theme = "sys_core"

[editor]
line-number = "relative"
cursorline = true
color-modes = true
bufferline = "always"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.statusline]
left = ["mode", "spinner"]
center = ["file-name"]
right = ["diagnostics", "selections", "position", "file-encoding", "file-type"]
separator = " ▓▒░ "

[editor.statusline.mode]
normal = "[SYS_NORM]"
insert = "[SYS_INSR]"
select = "[SYS_SEL ]"
