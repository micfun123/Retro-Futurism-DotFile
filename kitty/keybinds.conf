
# Leader key behavior
map ctrl+a>r load_config_file
map ctrl+a>e edit_config_file
map ctrl+a>d debug_config

# Tabs
map ctrl+shift+left previous_tab
map ctrl+shift+right next_tab
map ctrl+shift+, move_tab_backward
map ctrl+shift+. move_tab_forward
map ctrl+a>, set_tab_title
map ctrl+a>c new_tab
map ctrl+a>x close_tab

# Splits
# Horizontal split
map ctrl+a>- launch --location=hsplit --cwd=current

# Horizontal split without cwd
map ctrl+a>shift+- launch --location=hsplit

# Vertical split
map ctrl+a>backslash launch --location=vsplit --cwd=current

# Vertical split without cwd
map ctrl+a>shift+backslash launch --location=vsplit


# Window control
map ctrl+a>x close_window
map ctrl+a>z toggle_layout stack

# Navigate windows
map ctrl+left neighboring_window left
map ctrl+right neighboring_window right
map ctrl+up neighboring_window up
map ctrl+down neighboring_window down

map ctrl+a>h neighboring_window left
map ctrl+a>l neighboring_window right
map ctrl+a>k neighboring_window up
map ctrl+a>j neighboring_window down

# Move windows
map shift+left move_window left
map shift+right move_window right
map shift+up move_window up
map shift+down move_window down

# Resize
map alt+n resize_window narrower
map alt+w resize_window wider
map alt+u resize_window taller
map alt+d resize_window shorter
map ctrl+home resize_window reset

# Font size
map ctrl+equal change_font_size all +2.0
map ctrl+minus change_font_size all -2.0
map ctrl+0 change_font_size all 0
